<div class="container mt-5" *ngIf="device() as d">
  <div class="row">
    <!-- Left Section -->
    <div class="col-md-4 text-center">
      <div class="card shadow p-4">
        <i class="bi bi-cpu" style="font-size: 100px;"></i>
        <h4 class="mt-3">{{ d.deviceName }}</h4>
        <p class="text-muted">Part No: {{ d.partNumber}}</p>
      </div>
    </div>
    <!-- Right Section -->
    <div class="col-md-8">
      <div class="card shadow p-4">
        <h3 class="mb-4">Device Details</h3>
        <div class="row mb-3">
          <div class="col-6 fw-bold">Building Name:</div>
          <div class="col-6">{{ d.buildingName}}</div>
        </div>
        <div class="row mb-3">
          <div class="col-6 fw-bold">Device Type:</div>
          <div class="col-6">{{ d.deviceType }}</div>
        </div>
        <div class="row mb-3">
          <div class="col-6 fw-bold">Shelf Positions:</div>
          <div class="col-6">{{ d.numOfSP }}</div>
        </div>
        <hr class="my-4">
        <div class="d-flex justify-content-between">
          <button class="btn btn-warning px-4" (click)="updateDevice()">
            Update
          </button>
          <button class="btn btn-danger px-4" (click)="deleteDevice()">
            Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
