<div class="container mt-5">
  <div class="card shadow p-5">
    <h3 class="mb-4">Create Device</h3>
    <form [formGroup]="deviceForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Device Name</label>
        <input type="text" class="form-control" formControlName="deviceName">
      </div>
      <div class="mb-3">
        <label class="form-label">Part Number</label>
        <input type="text" class="form-control" formControlName="partNumber">
      </div>
      <div class="mb-3">
        <label class="form-label">Building Name</label>
        <input type="text" class="form-control" formControlName="buildingName">
      </div>
      <div class="mb-3">
        <label class="form-label">Device Type</label>
        <input type="text" class="form-control" formControlName="deviceType">
      </div>
      <div class="mb-4">
        <label class="form-label">Number Of Shelf Positions</label>
        <input type="number" class="form-control" formControlName="numOfSP">
      </div>
      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" (click)="cancel()">
          Cancel
        </button>
        <button type="submit" class="btn btn-success" [disabled]="deviceForm.invalid">
          Create Device
        </button>
      </div>
    </form>
  </div>
</div>
