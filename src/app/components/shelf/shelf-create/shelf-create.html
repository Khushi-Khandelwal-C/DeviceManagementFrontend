<h3 class="mb-4">Create Shelf</h3>

<form [formGroup]="shelfForm" (ngSubmit)="onSubmit()">

  <div class="mb-3">
    <label class="form-label">Shelf Name</label>
    <input
      type="text"
      class="form-control"
      formControlName="shelfName">
  </div>

  <div class="mb-3">
    <label class="form-label">Part Number</label>
    <input
      type="text"
      class="form-control"
      formControlName="partNumber">
  </div>

  <div class="d-flex justify-content-between">

    <button
      type="button"
      class="btn btn-secondary"
      (click)="cancel()">
      Cancel
    </button>

    <button
      type="submit"
      class="btn btn-success"
      [disabled]="shelfForm.invalid">
      Create Shelf
    </button>

  </div>

</form>
